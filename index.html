<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Strict Content Security Policy to prevent external script loading or exfiltration.
         object-src is explicitly locked down since we no longer use <object>/<embed>. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src blob: data:; media-src blob:; frame-src blob:; object-src 'none'; connect-src 'none';">
    <title>Minimalist Secure File Tool</title>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #000000;
            --gray: #777777;
            --light-gray: #f5f5f5;
            --border: #000000;
        }

        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--fg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--bg);
            padding: 40px;
            border: 2px solid var(--border);
            width: 100%;
            max-width: 480px;
            box-shadow: 6px 6px 0px var(--fg);
        }

        h2, h3 { 
            margin-top: 0; 
            color: var(--fg); 
            text-align: center; 
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .warning-box {
            border: 1px solid var(--border);
            background-color: var(--light-gray);
            padding: 15px;
            margin-bottom: 25px;
            font-size: 0.85em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        hr {
            border: 0;
            border-top: 1px solid var(--border);
            margin: 30px 0;
        }

        /* Drag and Drop Zone */
        .drop-zone {
            border: 2px dashed var(--gray);
            padding: 40px 20px;
            text-align: center;
            color: var(--gray);
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 20px;
            font-size: 0.9em;
            letter-spacing: 0.5px;
        }
        
        .drop-zone.dragover {
            border-style: solid;
            border-color: var(--fg);
            background-color: var(--fg);
            color: var(--bg);
        }
        
        .drop-zone input[type="file"] { display: none; }

        .button-group { display: flex; gap: 15px; margin-top: 20px; }
        
        button {
            flex: 1; 
            padding: 14px; 
            border: 2px solid var(--border); 
            background-color: var(--fg);
            color: var(--bg); 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85em;
        }
        
        button:hover:not(:disabled) { 
            background-color: var(--bg); 
            color: var(--fg);
        }

        #registerBtn { margin-bottom: 10px; width: 100%; }

        button:disabled { 
            background-color: var(--light-gray); 
            color: var(--gray);
            border-color: var(--gray);
            cursor: not-allowed; 
        }

        #status {
            margin-top: 25px; 
            text-align: center; 
            font-size: 0.85em;
            font-weight: 600; 
            min-height: 20px; 
            word-break: break-word;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .success { color: var(--fg); }
        .error { color: var(--fg); text-decoration: underline; }
        .working { color: var(--gray); font-style: italic; }

        /* Fullscreen Modal */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.95); z-index: 1000;
            justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
        }
        
        .modal-content {
            background: var(--bg); width: 100%; max-width: 95vw; height: 95vh;
            border: 2px solid var(--border);
            display: flex; flex-direction: column;
            box-shadow: 8px 8px 0px var(--fg); overflow: hidden;
        }
        
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; border-bottom: 2px solid var(--border); background: var(--bg); flex-wrap: wrap; gap: 15px;
        }
        
        .modal-header-buttons { display: flex; gap: 15px; }
        
        .modal-header h3 { margin: 0; font-size: 1em; }
        
        #viewerContent {
            flex: 1; display: flex; justify-content: center; align-items: center;
            padding: 20px; overflow: auto; background: var(--light-gray);
        }
        
        /* All decrypted content now renders inside a sandboxed iframe */
        #viewerContent iframe { width: 100%; height: 100%; border: 1px solid var(--border); background: var(--bg); }
    </style>
</head>
<body>

<div class="container">
    <h2>Secure File Tool</h2>
    
    <div class="warning-box" id="protocolWarning" style="display: none;">
        [!] Hardware keys require a Secure Context (localhost or HTTPS). App may fail on file:// protocol.
    </div>

    <div>
        <label>Step 1: Link Hardware Key</label>
        <button id="registerBtn">Register Key (First Time)</button>
    </div>
    
    <hr>

    <label>Step 2: Provide File</label>
    
    <div class="drop-zone" id="dropZone">
        <span id="dropZoneText">DRAG & DROP FILE HERE<br><br>OR CLICK TO SELECT</span>
        <input type="file" id="fileInput">
    </div>

    <div class="button-group">
        <button id="encryptBtn">Encrypt</button>
        <button id="decryptBtn">Decrypt</button>
    </div>

    <div id="status"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="viewerTitle">Viewer</h3>
            <div class="modal-header-buttons">
                <button id="downloadViewerBtn">Download</button>
                <button id="clearBtn">Close & Wipe</button>
            </div>
        </div>
        <div id="viewerContent"></div>
    </div>
</div>

<script>
    // Constants & Configurations
    const PRF_SALT = new TextEncoder().encode("LocalFileEncryptionAppSalt_00000"); 

    // DOM Elements
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const dropZoneText = document.getElementById('dropZoneText');
    const registerBtn = document.getElementById('registerBtn');
    const encryptBtn = document.getElementById('encryptBtn');
    const decryptBtn = document.getElementById('decryptBtn');
    const statusDiv = document.getElementById('status');
    const modalOverlay = document.getElementById('modalOverlay');
    const viewerContent = document.getElementById('viewerContent');
    const viewerTitle = document.getElementById('viewerTitle');
    const clearBtn = document.getElementById('clearBtn');
    const downloadViewerBtn = document.getElementById('downloadViewerBtn');

    // State Variables
    let selectedFile = null;
    let currentBlobUrl = null;
    let currentDecryptedName = null;

    if (window.location.protocol === 'file:') document.getElementById('protocolWarning').style.display = 'block';

    // UI Helpers
    async function uiYield(message, type = 'working') {
        statusDiv.textContent = message;
        statusDiv.className = type;
        await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
    }

    function toggleButtons(disabled) {
        encryptBtn.disabled = disabled;
        decryptBtn.disabled = disabled;
        registerBtn.disabled = disabled;
    }

    // Secure Memory Wiper (Zeroes out ArrayBuffers before garbage collection)
    function wipeMemory(buffer) {
        if (buffer && buffer.byteLength > 0) {
            new Uint8Array(buffer).fill(0);
        }
    }

    // Base64 Binary Utilities
    function buf2b64(buf) { return btoa(String.fromCharCode.apply(null, new Uint8Array(buf))); }
    function b642buf(b64) { return new Uint8Array(atob(b64).split('').map(c => c.charCodeAt(0))); }

    // WebAuthn throws generic DOMExceptions whose .message is deliberately vague
    // ("The operation failed for an operation-specific reason") for privacy reasons.
    // .name is far more informative — surface it with an actionable hint instead.
    function describeAuthError(error) {
        if (!(error instanceof DOMException)) return error.message;
        switch (error.name) {
            case 'NotAllowedError':
                return 'No matching hardware key found for this exact site, the prompt was cancelled, or it timed out. Make sure you are on the same origin where you ran "Register Key", and complete the fingerprint/PIN/touch/security-key prompt when it appears.';
            case 'InvalidStateError':
                return 'This hardware key is already registered for this site.';
            case 'SecurityError':
                return 'This page is not running in a secure context (HTTPS or localhost is required for hardware keys).';
            case 'NotSupportedError':
                return 'This browser or authenticator does not support the required PRF extension.';
            case 'AbortError':
                return 'The hardware key operation was aborted or timed out.';
            default:
                return `${error.name}: ${error.message}`;
        }
    }

    // Drag & Drop Logic
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => handleFileSelect(e.target.files[0]));
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) handleFileSelect(e.dataTransfer.files[0]);
    });

    function handleFileSelect(file) {
        if (!file) return;
        selectedFile = file;
        dropZoneText.innerHTML = `SELECTED: <br>${file.name} <br>(${(file.size / 1024 / 1024).toFixed(2)} MB)`;
    }

    // Crypto Keys Generation
    async function getHardwareKeyPRF() {
        const challenge = window.crypto.getRandomValues(new Uint8Array(32));
        const assertion = await navigator.credentials.get({
            publicKey: { challenge, userVerification: "required", extensions: { prf: { eval: { first: PRF_SALT } } } }
        });
        const ext = assertion.getClientExtensionResults();
        if (!ext.prf?.results?.first) throw new Error("Hardware key missing PRF extension.");
        return ext.prf.results.first;
    }

    async function deriveHKDFKey(ikm, salt) {
        const keyMaterial = await window.crypto.subtle.importKey("raw", ikm, { name: "HKDF" }, false, ["deriveKey"]);
        return window.crypto.subtle.deriveKey(
            { name: "HKDF", salt: salt, info: new Uint8Array(), hash: "SHA-256" },
            keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
        );
    }

    // Step 1: Registration
    registerBtn.addEventListener('click', async () => {
        try {
            toggleButtons(true);
            await uiYield('Awaiting Hardware Key Registration...', 'working');
            const challenge = window.crypto.getRandomValues(new Uint8Array(32));
            const userId = window.crypto.getRandomValues(new Uint8Array(16));
            await navigator.credentials.create({
                publicKey: {
                    challenge, rp: { name: "Local Hardware Encryptor" }, user: { id: userId, name: "local-user", displayName: "Local User" },
                    pubKeyCredParams: [{ alg: -7, type: "public-key" }, { alg: -257, type: "public-key" }],
                    authenticatorSelection: { userVerification: "required", residentKey: "required" },
                    extensions: { prf: { eval: { first: PRF_SALT } } }
                }
            });
            await uiYield('[ SUCCESS ] Hardware Key Linked', 'success');
        } catch (error) {
            console.error(error);
            await uiYield(`[ ERROR ] ${describeAuthError(error)}`, 'error');
        } finally { toggleButtons(false); }
    });

    // Step 2: Encryption
    encryptBtn.addEventListener('click', async () => {
        if (!selectedFile) return uiYield('[ ERROR ] File required', 'error');
        
        let rawDek = null;
        let hwPrf = null;

        try {
            toggleButtons(true);
            
            await uiYield('Awaiting Hardware Key Authorization...', 'working');
            hwPrf = await getHardwareKeyPRF();

            await uiYield('Processing Cryptography...', 'working');
            
            const dek = await window.crypto.subtle.generateKey({ name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]);
            rawDek = await window.crypto.subtle.exportKey("raw", dek);
            const fileIv = window.crypto.getRandomValues(new Uint8Array(12));

            const metadata = {
                filename: selectedFile.name, // Will be sanitized on readout
                mime: selectedFile.type || 'application/octet-stream',
                file_iv: buf2b64(fileIv)
            };

            const hwSalt = window.crypto.getRandomValues(new Uint8Array(16));
            const hwIv = window.crypto.getRandomValues(new Uint8Array(12));
            const hwKek = await deriveHKDFKey(hwPrf, hwSalt);
            const hwEncDek = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: hwIv }, hwKek, rawDek);
            
            metadata.hw = { salt: buf2b64(hwSalt), iv: buf2b64(hwIv), enc_dek: buf2b64(hwEncDek) };

            await uiYield('Encrypting Payload...', 'working');
            const fileBuffer = await selectedFile.arrayBuffer();

            // The header (filename, mime, salt, IV, wrapped key) is passed as AES-GCM
            // Additional Authenticated Data. This binds the whole header to the file
            // ciphertext, so tampering with any header field after the fact (e.g.
            // swapping `mime` to force a different, more dangerous viewer code path)
            // causes decryption to fail rather than being silently trusted.
            const headerBytes = new TextEncoder().encode(JSON.stringify(metadata));
            const encryptedFileData = await window.crypto.subtle.encrypt(
                { name: "AES-GCM", iv: fileIv, additionalData: headerBytes }, dek, fileBuffer
            );

            await uiYield('Packaging...', 'working');
            const lengthBuf = new ArrayBuffer(4);
            new DataView(lengthBuf).setUint32(0, headerBytes.length, true); 

            const finalBlob = new Blob([lengthBuf, headerBytes, encryptedFileData], { type: 'application/octet-stream' });
            
            const url = URL.createObjectURL(finalBlob);
            const a = document.createElement('a');
            a.href = url; a.download = selectedFile.name + '.enc';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(url);

            await uiYield('[ SUCCESS ] File Encrypted', 'success');
        } catch (error) {
            console.error(error);
            await uiYield(`[ ERROR ] ${describeAuthError(error)}`, 'error');
        } finally { 
            wipeMemory(rawDek);
            wipeMemory(hwPrf);
            toggleButtons(false); 
        }
    });

    // Step 3: Decryption
    decryptBtn.addEventListener('click', async () => {
        if (!selectedFile) return uiYield('[ ERROR ] Encrypted file required', 'error');

        let rawDek = null;
        let hwPrf = null;

        try {
            toggleButtons(true);
            await uiYield('Parsing Headers...', 'working');
            
            const fileBuffer = await selectedFile.arrayBuffer();
            const dv = new DataView(fileBuffer);
            const headerLen = dv.getUint32(0, true);
            
            const headerBytes = new Uint8Array(fileBuffer.slice(4, 4 + headerLen));
            const metadata = JSON.parse(new TextDecoder().decode(headerBytes));
            const encryptedFileBytes = fileBuffer.slice(4 + headerLen);

            if (!metadata.hw) throw new Error("Invalid file format: Missing hardware key metadata.");

            await uiYield('Awaiting Hardware Key Authorization...', 'working');
            hwPrf = await getHardwareKeyPRF();
            
            await uiYield('Decrypting to Memory...', 'working');
            const hwKek = await deriveHKDFKey(hwPrf, b642buf(metadata.hw.salt));
            rawDek = await window.crypto.subtle.decrypt(
                { name: "AES-GCM", iv: b642buf(metadata.hw.iv) }, hwKek, b642buf(metadata.hw.enc_dek)
            );

            const dek = await window.crypto.subtle.importKey("raw", rawDek, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);

            // headerBytes is supplied as AAD, matching what was used at encryption time.
            // If the header (including `mime`) was tampered with, this throws here,
            // before any content ever reaches the viewer.
            const decryptedContent = await window.crypto.subtle.decrypt(
                { name: "AES-GCM", iv: b642buf(metadata.file_iv), additionalData: headerBytes }, dek, encryptedFileBytes
            );

            const blob = new Blob([decryptedContent], { type: metadata.mime });
            currentBlobUrl = URL.createObjectURL(blob);
            
            // XSS Prevention: Safe text injection for the title
            currentDecryptedName = metadata.filename;
            viewerTitle.textContent = `VIEWING: ${metadata.filename}`;

            await renderInSandbox(metadata.mime, blob, metadata.filename);

            modalOverlay.style.display = 'flex';
            await uiYield('[ SUCCESS ] File Decrypted', 'success');
        } catch (error) {
            console.error(error);
            await uiYield(`[ ERROR ] ${describeAuthError(error)}`, 'error');
        } finally { 
            wipeMemory(rawDek);
            wipeMemory(hwPrf);
            toggleButtons(false); 
        }
    });

    // Renders decrypted content inside a sandboxed <iframe> instead of directly in the
    // page's own DOM. The sandbox uses `allow-same-origin` (so it can still load the
    // blob: URL, which is origin-scoped) but deliberately omits `allow-scripts`,
    // `allow-forms`, `allow-popups`, and `allow-top-navigation`. That means:
    //   - Any <script> embedded in a decrypted file (e.g. an HTML file, or an SVG with
    //     an inline script masquerading as an image) cannot execute.
    //   - Even if `metadata.mime` were wrong or spoofed, the frame content still can't
    //     run script or navigate the parent page — unlike the previous <object> element,
    //     which rendered untyped content directly in the parent document's own context.
    // This replaces per-type trust decisions (img/video/audio/pre/object) with one
    // consistent isolation boundary that holds regardless of what the content turns out
    // to actually be.
    // Browsers are unreliable about setting a mime type for plain-text formats —
    // .csv in particular is commonly reported as an empty string, or as
    // "application/vnd.ms-excel" / "text/comma-separated-values" depending on the
    // OS and browser, rather than "text/csv". When that happens the mime falls back
    // to "application/octet-stream" and would otherwise be treated as opaque binary.
    // Use the (AAD-authenticated) filename extension as a fallback signal.
    const TEXT_LIKE_EXTENSIONS = ['csv', 'tsv', 'txt', 'json', 'md', 'log', 'xml', 'yaml', 'yml', 'ini', 'conf'];
    function looksLikeText(mime, filename) {
        if (mime.startsWith('text/') || mime === 'application/json') return true;
        const ext = (filename.split('.').pop() || '').toLowerCase();
        return TEXT_LIKE_EXTENSIONS.includes(ext);
    }

    async function renderInSandbox(mime, blob, filename) {
        viewerContent.innerHTML = '';
        const iframe = document.createElement('iframe');
        iframe.setAttribute('sandbox', 'allow-same-origin');
        iframe.setAttribute('referrerpolicy', 'no-referrer');

        if (mime.startsWith('image/') || mime.startsWith('video/') || mime.startsWith('audio/')) {
            let tag;
            if (mime.startsWith('image/')) tag = `<img src="${currentBlobUrl}" alt="preview">`;
            else if (mime.startsWith('video/')) tag = `<video src="${currentBlobUrl}" controls autoplay></video>`;
            else tag = `<audio src="${currentBlobUrl}" controls></audio>`;

            iframe.srcdoc = `<!DOCTYPE html><html><head><meta charset="utf-8">
                <meta http-equiv="Content-Security-Policy" content="default-src blob:; script-src 'none'; object-src 'none'; style-src 'unsafe-inline';">
                <style>html,body{margin:0;height:100%;display:flex;align-items:center;justify-content:center;background:#f5f5f5;overflow:auto;}
                img,video{max-width:100%;max-height:100%;object-fit:contain;}audio{width:90%;}</style></head>
                <body>${tag}</body></html>`;
        } else if (looksLikeText(mime, filename)) {
            const text = await blob.text();
            const escaped = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
            iframe.srcdoc = `<!DOCTYPE html><html><head><meta charset="utf-8">
                <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'none'; style-src 'unsafe-inline';">
                <style>body{margin:0;padding:20px;box-sizing:border-box;font-family:monospace;white-space:pre-wrap;word-wrap:break-word;background:#fff;color:#000;}</style></head>
                <body>${escaped}</body></html>`;
        } else {
            // Fallback for PDFs and any other/unknown type: load the blob directly in
            // the sandboxed frame instead of an <object> element. Script execution is
            // still blocked by the sandbox regardless of the file's real content or a
            // spoofed mime value.
            iframe.src = currentBlobUrl;
        }

        viewerContent.appendChild(iframe);
    }

    // Download Decrypted File
    downloadViewerBtn.addEventListener('click', async () => {
        try {
            downloadViewerBtn.textContent = "AUTH...";
            downloadViewerBtn.disabled = true;

            // Re-authenticate hardware key presence
            await getHardwareKeyPRF();

            const a = document.createElement('a');
            a.href = currentBlobUrl; 
            a.download = currentDecryptedName;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            
        } catch (err) {
            console.error(err);
            alert(`[ ERROR ] ${describeAuthError(err)}`);
        } finally {
            downloadViewerBtn.textContent = "DOWNLOAD";
            downloadViewerBtn.disabled = false;
        }
    });

    // Cleanup Logic
    clearBtn.addEventListener('click', () => {
        if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); currentBlobUrl = null; }
        currentDecryptedName = null;
        viewerContent.innerHTML = '';
        modalOverlay.style.display = 'none';
        uiYield('MEMORY WIPED', 'working');
    });

</script>
</body>
</html>
